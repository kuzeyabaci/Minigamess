<head>
<meta charset="UTF-8">

<title>Mini Oyunlar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;min-height:100vh;font-family:'Nunito',sans-serif;overflow-x:hidden}
#menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 40px;position:relative;z-index:1}
.logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:3px;margin-bottom:4px;background:linear-gradient(135deg,#ffd60a,#ff9f0a,#ff2d55,#bf5af2,#0a84ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:#333;font-size:9px;letter-spacing:4px;margin-bottom:24px;font-family:'Orbitron',monospace}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:380px}
.card{background:var(--bg);border:2px solid rgba(128,128,128,0.12);border-radius:18px;padding:20px 14px;text-align:center;cursor:pointer;transition:transform 0.15s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(0.92)}
.em{font-size:36px;margin-bottom:8px}
.tt{color:#fff;font-size:12px;font-weight:900}
.star{position:fixed;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate;pointer-events:none;z-index:0}
@keyframes tw{from{opacity:.05}to{opacity:.5}}
#gv{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:#08080f}
#gv.on{display:flex}
#tb{display:flex;align-items:center;gap:12px;background:#0d0d1a;padding:7px 12px;border-bottom:1px solid #1a1a3a;flex-shrink:0;height:46px}
#bb{background:#1a1a3a;border:1px solid #2a2a5a;color:#aaa;width:36px;height:36px;border-radius:10px;font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;font-family:sans-serif;display:flex;align-items:center;justify-content:center}
#bb:active{background:#3a3a7a;color:#fff}
#gt{color:#fff;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px}
#gw{flex:1;position:relative;overflow:hidden}
#gw iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
[id="gd-flappy"]{display:none}[id="gd-yilan"]{display:none}[id="gd-tetris"]{display:none}[id="gd-g2048"]{display:none}[id="gd-pingpong"]{display:none}[id="gd-brick"]{display:none}[id="gd-hafiza"]{display:none}[id="gd-labirent"]{display:none}[id="gd-uzay"]{display:none}[id="gd-dino"]{display:none}
</style>

<script>
var T={"flappy":"🐦 Flappy Kuş","yilan":"🐍 Yılan","tetris":"🧱 Tetris","g2048":"🔢 2048","pingpong":"🏓 Ping Pong","brick":"🧨 Brick Breaker","hafiza":"🧠 Hafıza","labirent":"🌀 Labirent","uzay":"🚀 Uzay Savaşı","dino":"🦕 Dino Koşusu"};
(function(){
  for(var i=0;i<55;i++){
    var s=document.createElement('div');
    s.className='star';
    s.style.width=(Math.random()*2+1)+'px';
    s.style.height=s.style.width;
    s.style.left=(Math.random()*100)+'%';
    s.style.top=(Math.random()*100)+'%';
    s.style.setProperty('--d',(Math.random()*3+1).toFixed(1)+'s');
    document.body.appendChild(s);
  }
})();

function play(id){
  var el=document.getElementById('gd-'+id);
  var b64=el.getAttribute('data-b');
  var bin=atob(b64);
  var bytes=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  var html=new TextDecoder().decode(bytes);
  var gw=document.getElementById('gw');
  gw.innerHTML='';
  var f=document.createElement('iframe');
  f.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none';
  f.srcdoc=html;
  gw.appendChild(f);
  document.getElementById('gt').textContent=T[id]||id;
  document.getElementById('gv').classList.add('on');
  document.body.style.overflow='hidden';
}

function back(){
  document.getElementById('gw').innerHTML='';
  document.getElementById('gv').classList.remove('on');
  document.body.style.overflow='';
}
</script>
