<head>
<meta charset="UTF-8">

<title>Mini Oyunlar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;min-height:100vh;font-family:'Nunito',sans-serif;overflow-x:hidden;user-select:none}
#menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 40px}
.logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:3px;margin-bottom:4px;background:linear-gradient(135deg,#ffd60a,#ff9f0a,#ff2d55,#bf5af2,#0a84ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:#333;font-size:9px;letter-spacing:4px;margin-bottom:24px;font-family:'Orbitron',monospace}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:380px}
.card{background:var(--bg);border:2px solid rgba(128,128,128,0.12);border-radius:18px;padding:20px 14px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.card:active{transform:scale(0.92)}
.em{font-size:36px;margin-bottom:8px}
.tt{color:#fff;font-size:12px;font-weight:900}
.star{position:fixed;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate;pointer-events:none}
@keyframes tw{from{opacity:.05}to{opacity:.5}}
#gview{position:fixed;inset:0;display:none;flex-direction:column;background:#08080f;z-index:50}
#gview.on{display:flex}
#tb{display:flex;align-items:center;gap:10px;background:#0d0d1a;padding:6px 12px;border-bottom:1px solid #1a1a3a;height:46px;flex-shrink:0}
#bb{background:#1a1a3a;border:1px solid #2a2a5a;color:#aaa;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#gt{color:#fff;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px}
#gframe{flex:1;border:none;width:100%;height:100%}
</style>
</head>

for(var i=0;i<55;i++){
  var s=document.createElement('div');
  s.className='star';
  s.style.width=(Math.random()*2+1)+'px';
  s.style.height=s.style.width;
  s.style.left=(Math.random()*100)+'%';
  s.style.top=(Math.random()*100)+'%';
  s.style.setProperty('--d',(Math.random()*3+1).toFixed(1)+'s');
  document.body.appendChild(s);
}

document.querySelectorAll('.card').forEach(function(c){
  c.addEventListener('click',function(){ play(this.dataset.id); });
});

function play(id){
  var b64 = G[id];
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  var html = new TextDecoder('utf-8').decode(bytes);
  var f = document.getElementById('gframe');
  f.srcdoc = html;
  document.getElementById('gt').textContent = T[id]||id;
  document.getElementById('gview').classList.add('on');
  document.body.style.overflow='hidden';
}

function back(){
  var f=document.getElementById('gframe');
  f.srcdoc='<!DOCTYPE html><html><body></body></html>';
  document.getElementById('gview').classList.remove('on');
  document.body.style.overflow='';
}
</script>
